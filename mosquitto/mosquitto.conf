# Mosquitto configuration for Apisto
listener 1883
protocol mqtt

# WebSocket listener (for browser-based MQTT clients)
listener 9001
protocol websockets

# Allow anonymous for v1 — auth handled at application layer
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection limits
max_connections -1
